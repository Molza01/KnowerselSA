                    </ul>
                </nav>

            </div>
        </nav>

    <!-- Main Content -->
    <main class="main-content">
        <div class="container">
            <h1 class="title ">
                Get in Touch With Us
            </h1>

            <div class="content-wrapper">
                <div class="left-content">
                    <p class="description">
                        If you'd like to join the team,<br>
                        partner with us, or have any<br>
                        other general inquiries,
                    </p>
                    <p class="contact-info">
                        Please Connect Us Through :<br>
                        <a href="mailto:info@lsanetic.com" class="email-link">info@lsanetic.com</a>
                    </p>
                </div>

<!-- Address Section to add address pn no. -->

                <div class="divider"></div>


                
<!-- Email Form Start -->

                <div class="right-content">
                    <form class="contact-form" id="contactForm" action="https://api.web3forms.com/submit" method="POST">
                        <input type="hidden" name="access_key" value="1f07bd32-7ff2-4a19-8e3c-a75892d326fe">
                        <!-- Subject field -->
                        <input type="hidden" name="subject" id="subject">
                        <input id="name" type="text" placeholder="Name*" name="name" class="form-input box1" required>
                        <input type="email" placeholder="Email*" name="email" class="form-input email box2" required>
                        <input type="tel" placeholder="Phone No. (Optional)" name="tel" class="form-input box3"
                            pattern="[0-9]*">
                        <textarea placeholder="Message" name="message" class="form-textarea box4" rows="6"
                            required></textarea>
                        <button id="send-btn" type="submit" class="send-button box5">
                            <span class="send-txt">Send</span>
                            <span class="arrow">
                                <img src="./src/assets/about-us/send.png" alt="">
                            </span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </main>

<script>
    window.addEventListener("scroll", function () {
        const nav = document.getElementById("nav");

        if (window.scrollY > 50) { // when scrolled down 50px
            nav.classList.add("scrolled");
        } else {
            nav.classList.remove("scrolled");
        }
    });
</script>
