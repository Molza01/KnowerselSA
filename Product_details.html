<script>
    const params = new URLSearchParams(window.location.search);
    const productId = params.get("id");
    const product = PRODUCTS[productId];

    if (!product) {
        console.warn(`No product found for id: "${productId}". Redirecting...`);
        window.location.href = "product.html";
    } else {
        // Page title
        document.title = product.pageTitle;

        // Back arrow
        document.getElementById("back-link").href = product.backLink;

        // CTA → content.html with same id
        document.getElementById("checkout-link").href = `content.html?id=${productId}`;

        // Helper — builds HTML for advantages/applications
        // Supports 3 formats:
        //   array  → bullet <li> list
        //   string → plain <p>
        //   object { type:"para", label, text } → labeled paragraph
        const buildSection = (data, defaultLabel) => {
            if (Array.isArray(data)) {
                return {
                    label: defaultLabel,
                    html: `<ul class="right-items-heading">${data.map(a => `<li class="right-items">${a}</li>`).join("")}</ul>`
                };
            } else if (typeof data === "object" && data.type === "para") {
                return {
                    label: data.label,
                    html: `<p class="desc-para">${data.text}</p>`
                };
            } else {
                return {
                    label: defaultLabel,
                    html: `<p class="desc-para">${data}</p>`
                };
            }
        };

        const adv = buildSection(product.advantages, "Key Advantages");
        const app = buildSection(product.applications, "Applicable Deployment");

        // If both are "para" type → stack vertically, otherwise side by side
        const isPara = !Array.isArray(product.advantages) && !Array.isArray(product.applications);
        const descHTML = isPara
            ? `<div class="product-desc product-desc--stacked">
                    <div class="stacked-point">
                        <h2>${adv.label}</h2>
                        ${adv.html}
                    </div>
                    <div class="stacked-point">
                        <h2>${app.label}</h2>
                        ${app.html}
                    </div>
               </div>`
            : `<div class="product-desc" style="margin-top: -2rem;">
                    <div class="right-points">
                        <h2>${adv.label}</h2>
                        <ul class="right-items-heading">${adv.html}</ul>
                    </div>
                    <div class="left-points">
                        <h2>${app.label}</h2>
                        <ul class="left-items-heading">${app.html}</ul>
                    </div>
               </div>`;

        // Inject product section
        const titleClass = productId === "product_2" ? "title2" : "title1";
        document.getElementById("product-container").innerHTML = `
            <div class="product-intro">
                <div class="${titleClass}">
                    <h1>${product.name}</h1>
                </div>
                <div class="para">
                    <p>${product.description}</p>
                </div>
            </div>
            <div class="product-img">
                <img src="${product.img}" alt="${product.name}" class="${productId === 'product_1' ? 'img1' : 'img2'}">
            </div>
            ${descHTML}
        `;
    }
</script>
